<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | NFT preview card component</title>

    <link rel="stylesheet" href="style.css" />
    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <!-- FONT -->
  </head>
  <body>
    <main class="card">
      <header class="card-header">
        <img class="card-img" src="images/image-equilibrium.jpg" alt="" />
        <a class="card-img" href="images/icon-view.svg"></a>
      </header>

      <h1 class="card-headertxt">Equilibrium #3429</h1>

      <section class="card-msg">
        <div>Our Equilibrium collection promotes balance and calm.</div>
      </section>

      <section class="eth-container">
        <span class="eth">
          <img src="images/icon-ethereum.svg" alt="ethereum picture" /> 0.041
          ETH
        </span>
        <span class="clock">
          <img src="images/icon-clock.svg" alt="clock picture" /> 3 days left
        </span>
      </section>

      <section class="truce-container">
        <img
          class="truce-picture"
          src="images/pfp2.png"
          alt="truce picture"
        /><span class="truce-text"
          ><span>Coded by </span
          ><a href="https://github.com/DevTruce" target="_blank"
            >Truce R.</a
          ></span
        >
      </section>

      <footer class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >.
      </footer>
    </main>
  </body>
</html>
