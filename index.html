<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link rel="stylesheet" href="src/css/style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | NFT preview card component</title>
  </head>
  <body>
    <main class="container">
      <div class="nft-image">
        <a
          href="https://www.theverge.com/22310188/nft-explainer-what-is-blockchain-crypto-art-faq"
          target="_blank"
          class="nft-image-hover"
        ></a>
      </div>

      <h1 class="nft-header">Equilibrium #3429</h1>

      <p class="nft-text">
        Our Equilibrium collection promotes balance and calm.
      </p>

      <div class="eth-container">
        <span class="eth">
          <img src="src/images/icon-ethereum.svg" alt="ethereum" />
          <span>0.041 ETH</span>
        </span>

        <span class="clock">
          <img src="src/images/icon-clock.svg" alt="clock" />
          <span>3 days left</span>
        </span>
      </div>

      <div class="author-container">
        <img
          class="jules-image"
          src="src/images/image-avatar.png"
          alt="Jules Wyvren"
        />

        <p class="creation-of">
          Creation of<span class="jules"> Jules Wyvern</span>
        </p>
      </div>
    </main>

    <footer class="footer">
      <p>
        Challenge by
        <a
          class="links"
          href="https://www.frontendmentor.io/home"
          target="_blank"
          >Frontend Mentor</a
        >
      </p>
      <p>
        Coded by
        <a class="links" href="https://github.com/DevTruce" target="_blank"
          >Truce R</a
        >
      </p>
    </footer>
  </body>
</html>
